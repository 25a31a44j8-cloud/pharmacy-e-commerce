<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellcure - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        :root {
            --dark-blue: #0a1929;
            --black: #000000;
            --white: #ffffff;
            --gray: #f0f0f0;
        }

        /* Header */
        header {
            background-color: var(--dark-blue);
            color: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span {
            color: #4a90e2;
            font-weight: 300;
        }

        nav {
            background-color: var(--black);
            padding: 0.8rem 5%;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav ul li a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #4a90e2;
        }

        /* Login Container */
        .login-container {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 5%;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
        }

        .login-box {
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid #ddd;
        }

        .login-box h2 {
            color: var(--dark-blue);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--black);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--dark-blue);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #666;
        }

        .forgot a {
            color: var(--dark-blue);
            text-decoration: none;
        }

        .forgot a:hover {
            text-decoration: underline;
        }

        .login-btn {
            background-color: var(--dark-blue);
            color: var(--white);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            background-color: #1a3a5c;
        }

        .signup-link {
            text-align: center;
            color: #666;
        }

        .signup-link a {
            color: var(--dark-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background-color: var(--black);
            color: var(--white);
            padding: 2rem 5%;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Well<span>cure</span></h1>
        </div>
        <div class="cart-icon">
            <a href="cart.html" style="color: var(--white); text-decoration: none;">🛒 Cart (0)</a>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="medical-store.html">Medical Store</a></li>
            <li><a href="healthcare.html">Healthcare</a></li>
            <li><a href="lab-tests.html">Lab Tests</a></li>
            <li><a href="babycare.html">Baby Care</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="collaborations.html">Collaborations</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <form>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="remember-forgot">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <div class="forgot">
                        <a href="#">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <div class="signup-link">
                    Don't have an account? <a href="#">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Wellcure Pharmacy. All rights reserved.</p>
    </footer>
</body>
</html>
