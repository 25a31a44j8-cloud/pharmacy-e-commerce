<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellcure - Shopping Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --dark-blue: #0a1929;
            --black: #000000;
            --white: #ffffff;
            --gray: #f0f0f0;
        }

        body {
            background-color: #f5f5f5;
        }

        /* Header & Navigation */
        header {
            background-color: var(--dark-blue);
            color: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--black);
        }

        .logo h1 {
            font-size: 2rem;
        }

        .logo span {
            color: #4a90e2;
        }

        nav {
            background-color: var(--black);
            padding: 0.8rem 5%;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav ul li a {
            color: var(--white);
            text-decoration: none;
        }

        /* Page Title */
        .page-title {
            background-color: var(--dark-blue);
            color: var(--white);
            padding: 2rem 5%;
        }

        /* Cart Content */
        .cart-container {
